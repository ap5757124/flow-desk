flow-desk:
  security:
    jwt:
      secret: flow-desk-dev-secret-key-must-be-long-enough-123456
      access-token-expiration-minutes: 120
      refresh-token-expiration-days: 7

spring:
  application:
    name: flow-desk
  datasource:
    url: jdbc:mysql://localhost:13316/flow_desk?zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=utf-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver


server:
  port: 9966
  servlet:
    context-path: /ap


